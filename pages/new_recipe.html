    <main>
        <form class="container">
            <h3>Cadastrar nova receita</h3>
            <label>Título</label>
            <input type="text" id="title">
            <label>Ingredientes</label>
            <textarea name="" id="ingredients"></textarea>
            <label>Preparo</label>
            <textarea name="" id="recipe"></textarea>
            <label>Categoria</label>
            <select name="" id="category">
                <option disabled selected >Selecione</option>
                <option value="">Fácil</option>
                <option value="">Médio</option>
                <option value="">Difícil</option>
            </select>

            <label>Escolha uma imagem</label>
            <label for="upload" class="upload-file"">
            Escolher Arquivo
            </label>
            <input type="file" id="upload" style="display: none;">      
            <button type="button" onclick="verify()">Cadastrar</button>

        </form>
