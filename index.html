<!doctype html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0"
        />
        <title>Inicio</title>
        <link
            rel="stylesheet"
            href="./src/style.css"
        />
        <link
            rel="stylesheet"
            href="./src/cards.css"
        />
        <link
            rel="stylesheet"
            href="./src/modal.css"
        />
        <link
            rel="stylesheet"
            href="./src/filters.css"
        />
        <link 
            rel="stylesheet" 
            href="./src/robson.css">
    </head>
    <body>
        <header class="flex">
            <section class="flex logo-name">
                <img
                    src="./assets/hat_chef.png"
                    alt="Logo"
                    class="logo-img"
                />
                <h1>DataChef</h1>
            </section>

            <nav>
                <a href="./index.html">Início</a>
                <a href="./pages/my_recipes.html">Minhas receitas</a>
                <a href="./pages/new_recipe.html">Nova receita</a>
                <a href="./pages/about.html">Sobre</a>
            </nav>

            <a
                class="login-btn"
                href="./pages/login.html"
                >Login</a
            >
        </header>
        <main>
            <!--filtros e busca-->
            <!--
            ============================================
            início código Bruno Medeiros Dias 
            ============================================            
            -->
            <section class="filters">
                <h4>Categoria</h4>
                <div id="categories"></div>
                <div class="search-container">
                    <h4>Dificuldade</h4>
                        
                    <div class="level">
                        <button
                            class="category-btn"
                            onClick="filterByLevel('Todos')"
                        >Todos</button>
                        <button
                            class="category-btn"
                            onClick="filterByLevel('Fácil')"
                        >Fácil</button>
                        <button
                            class="category-btn"
                            onClick="filterByLevel('Médio')"
                        >Médio</button>
                        <button
                            class="category-btn"
                            onClick="filterByLevel('Difícil')"
                        >Difícil</button>
                    </div>

                    <h4>Buscar</h4>

                    <input
                            type="text"
                            id="search-input"
                            placeholder="Buscar receita..."
                            oninput="searchRecipes(this.value)"
                    />

                </div>

            </section>

            <!--listagem de receitas-->
            <div id="list"></div>

        <!--
        ============================================
        fim código Bruno Medeiros Dias 
        ============================================            
        -->
        </main>

        <footer>
            <section class="flex logo-name center">
                <img
                    src="./assets/hat_chef.png"
                    alt="Logo"
                    class="logo-img"
                />
                <h1>DataChef</h1>
            </section>

            <h2>Polo São Francisco de Paula</h2>

            <table>
                <tr>
                    <td><h3>Bruno Medeiros Dias</h3></td>

                        >

                <tr>
                    <td><h3>Robson Lopes dos Santos</h3></td>
                    <td>

                            >Github</a
                        >
                    </td>
                </tr>
                <tr>
                    <td><h3>Regina Gabriela Rodrigues Moraes</h3></td>
                    <td></td>
                </tr>
            </table>
        </footer>
    </body>

    <script src="./src/recipes.js"></script>
</html>
